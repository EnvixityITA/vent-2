<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Omori Style Text</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>Omori Style Text</h1>

    <label for="input-text">Testo da convertire:</label>
    <textarea id="input-text" rows="4" placeholder="Scrivi qui..."></textarea>

    <button id="generate-btn">Genera</button>

    <div class="preview-wrapper">
      <div class="dialogue-box">
        <div class="dialogue-text" id="output-text">
          Qui verrà mostrato il testo in stile Omori.
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
